# 示例 1：设备详情卡片
# 对应 key-device-report-sample.docx 中「关键设备详情」表格
# 结构：kv_grid（基本信息）+ tabular（关键指标）+ kv_grid（综合结论）

content:
  presentation:
    type: composite_table
    columns: 8

    sections:

      # ── 区段一：基本信息（SQL 单行 → 固定 KV 对）
      - band: "基本信息"
        layout:
          type: kv_grid
          cols_per_row: 2        # 每行两对 KV，左右并排
          key_span: 1            # 标签占 1 列
          value_span: 3          # 值占 3 列（1+3）*2 = 8 ✓
        source:
          kind: sql
          query: >
            SELECT name, model, location, install_date,
                   status, alarm_count_7d
            FROM devices WHERE device_id = '{$device}'
        fields:
          - key: "设备名称"
            col: "name"
          - key: "设备型号"
            col: "model"
          - key: "安装位置"
            col: "location"
          - key: "投入时间"
            col: "install_date"
          - key: "当前状态"
            col: "status"
          - key: "7天告警次数"
            col: "alarm_count_7d"

      # ── 区段二：关键指标（SQL 多行 → tabular）
      - band: "关键指标"
        layout:
          type: tabular
          headers:
            - label: "指标名"
              span: 2
            - label: "当前值"
              span: 2
            - label: "判断"
              span: 1
            - label: "说明"
              span: 3
          columns:
            - field: "metric_name"
              span: 2
            - field: "current_value"
              span: 2
            - field: "judgment"
              span: 1
            - field: "note"
              span: 3
        source:
          kind: sql
          query: >
            SELECT metric_name, current_value, judgment, note
            FROM device_metrics
            WHERE device_id = '{$device}'
              AND stat_date = (SELECT MAX(stat_date) FROM device_metrics WHERE device_id = '{$device}')

      # ── 区段三：综合结论（参数直填 → 全宽 KV）
      - band: "综合结论"
        layout:
          type: kv_grid
          cols_per_row: 1        # 每行一对，全宽
          key_span: 2            # 标签占 2 列
          value_span: 6          # 值占 6 列（2+6）*1 = 8 ✓
        source:
          kind: sql
          query: >
            SELECT overall_status, recommendations
            FROM device_conclusions
            WHERE device_id = '{$device}'
        fields:
          - key: "综合判断"
            col: "overall_status"
          - key: "建议动作"
            col: "recommendations"
