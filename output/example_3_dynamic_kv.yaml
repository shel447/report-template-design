# 示例 3：动态 KV 属性面板（datasets + presentation 平级）
# 适用场景：设备自定义属性数量不固定，由数据库返回
# 结构：kv_grid（固定）+ kv_grid（动态 KV）+ tabular（运行记录）

content:

  # ── 局部数据池定义 ──────────────────────────
  datasets:
    - id: "ds_device_attrs"
      source:
        kind: sql
        query: >
          SELECT attr_name, attr_value
          FROM device_attributes
          WHERE device_id = '{$device}'
          ORDER BY display_order
        key_col: "attr_name"      # SQL 行的这列作为 KV 的 key
        value_col: "attr_value"   # SQL 行的这列作为 KV 的 value

    - id: "ds_run_log"
      source:
        kind: sql
        query: >
          SELECT run_date, run_hours, alarm_count, remark
          FROM device_daily_log
          WHERE device_id = '{$device}'
            AND run_date >= '{time_range_start}'
          ORDER BY run_date DESC
          LIMIT 10

  # ── 视图呈现布局 ─────────────────────────────
  presentation:
    type: composite_table
    columns: 8

    sections:

      # ── 区段一：固定元信息（纯参数直填，无数据来源）
      - band: "设备标识"
        layout:
          type: kv_grid
          cols_per_row: 2
          key_span: 1
          value_span: 3
          fields:
            - key: "设备编号"
              value: "{$device}"
            - key: "报告周期"
              value: "{time_range}"

      # ── 区段二：动态属性（key_col/value_col 展开）
      - band: "设备档案"
        layout:
          type: kv_grid
          cols_per_row: 2
          key_span: 1
          value_span: 3
          dataset_id: "ds_device_attrs"  # 绑定动态 KV 数据集

      # ── 区段三：运行记录（多行 tabular）
      - band: "近期运行记录"
        layout:
          type: tabular
          dataset_id: "ds_run_log"
          headers:
            - label: "日期"
              span: 2
            - label: "运行时长(h)"
              span: 2
            - label: "告警次数"
              span: 2
            - label: "备注"
              span: 2
          columns:
            - field: "run_date"
              span: 2
            - field: "run_hours"
              span: 2
            - field: "alarm_count"
              span: 2
            - field: "remark"
              span: 2

