# 示例 4：带 AI 专家建议的设备评估表（datasets + presentation 平级 + DAG 依赖）
# 展示：多数据源的局部 DAG 依赖机制与 ai_synthesis 的使用

content:

  # ── 局部数据池定义（局部 DAG，仅限本 content 内部可用）────────────────
  datasets:

    # 1. 实时监控指标[无依赖，引擎可立即执行]
    - id: "ds_realtime_metrics"
      source:
        kind: sql
        query: >
          SELECT sensor_name, val, limit_val as limit,
                 CASE WHEN val > limit_val THEN '异常' ELSE '正常' END as status_tag
          FROM monitor_data WHERE device_id = '{$device}'

    # 2. 故障历史[无依赖，与 ds_realtime_metrics 可并发执行]
    - id: "ds_fault_history"
      source:
        kind: sql
        query: "SELECT fault_code, description FROM fault_logs WHERE device_id = '{$device}' LIMIT 5"

    # 3. AI 专家建议[显式依赖，等待 1、2 就绪后再执行]
    - id: "ds_expert_advice"
      depends_on: ["ds_realtime_metrics", "ds_fault_history"]   # DAG 依赖声明
      source:
        kind: ai_synthesis
        context:
          refs: ["ds_realtime_metrics", "ds_fault_history"]      # 引用同级数据集结果
        knowledge:
          query_template: "针对设备型号 {model} 的 {symptoms} 情况，提供诊断意见"
          params:
            subject: "{device_model}"
            symptoms: "refs.ds_realtime_metrics[status_tag='异常'].sensor_name"
            objective: "对比行业标准给出故障等级和维修指导"
        prompt: |
          你是一位资深工业设备专家。根据以下信息给出评估：
          1. 实时指标 (refs.ds_realtime_metrics)：包括测点值及状态。
          2. 故障历史 (refs.ds_fault_history)：该设备近期的报错频次。
          3. 知识库背景 (knowledge.result)：行业同类故障的处理规范。
          请在 150 字内给出针对性的健康评价及具体的检修步骤建议。

  # ── 视图呈现布局 ────────────────────────────────────────────────────
  presentation:
    type: composite_table
    columns: 8

    sections:

      # ── 区段一：监控指标快照（绑定 ds_realtime_metrics）
      - band: "监控指标快照"
        layout:
          type: tabular
          dataset_id: "ds_realtime_metrics"
          headers:
            - label: "测点"
              span: 3
            - label: "数值"
              span: 2
            - label: "阈值"
              span: 1
            - label: "状态"
              span: 2
          columns:
            - field: "sensor_name"
              span: 3
            - field: "val"
              span: 2
            - field: "limit"
              span: 1
            - field: "status_tag"
              span: 2

      # ── 区段二：AI 专家建议（绑定 ds_expert_advice）
      - band: "AI 专家评估与检修建议"
        layout:
          type: kv_grid
          cols_per_row: 1
          key_span: 2
          value_span: 6
          dataset_id: "ds_expert_advice"
          fields:
            - key: "评估建议"
              col: "output"    # AI 生成结果映射到 output 列

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 数据填充逻辑（运行时步序）：
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 1. 引擎分析 datasets，构建局部 DAG：
#      ds_realtime_metrics ─┐
#                            ├──► ds_expert_advice
#      ds_fault_history    ─┘
#
# 2. ds_realtime_metrics 和 ds_fault_history 无依赖，并发执行查询。
# 3. 两者均就绪后，执行 ds_expert_advice（ai_synthesis）：
#    a. 获取 ds_realtime_metrics / ds_fault_history 的 JSON 快照
#    b. 构造知识检索请求：
#         subject="KD-PUMP-204A"
#         symptoms="振动幅度"（筛选 status_tag='异常' 的测点名）
#         objective="对比行业标准给出故障等级和维修指导"
#    c. 调用知识检索接口，获取行业规范文本
#    d. 拼装 Prompt，调用 LLM，生成最终文本写入 output 字段
# 4. 按 sections 顺序渲染：先渲染指标快照，再渲染 AI 建议区。
