# 示例 5：大纲蓝图与单向编译架构 (WYSIWYG Blueprint Compiler)
# 结构展示：一个处于“蓝图配置期”的模板实例，包含了 Notion 式的 outline 区块列阵。
# 注意到这里没有任何数据库查询结果（如 8.5mm/s），大纲仅仅作为意图指令（Prompt / Intent）。
# 以及展示 Agent (Template Copilot) 是如何通过读取大纲，精准“编译”成底层 datasets 的。

title: "3.2 主轴承运行状态分析"

# ── 大纲意图交互层（WYSIWYG 蓝图来源）──
# 此时没有连接数据库，没有任何具体数值，只有用户通过 UI 组件拖拽出的“意图结构”
outline:
  - id: "blk_intro"
    type: "paragraph"
    content: "当前设备主轴承的运行基本情况如下。当前振动幅值为："
    
  - id: "blk_metric_vib"
    type: "metric"
    intent: "查询设备当前最近一次跑批的振动幅值"
    
  - id: "blk_ai_diag"
    type: "ai_summary"
    intent: "结合近期告警流水，评估轴承是否存在高频损坏风险，并注意现场已知有轻微漏油现象"
    
  - id: "blk_chart_trend"
    type: "chart"
    intent: "展示近 3 天的振动趋势折线图，用于辅助证明上述结论"


# ── 引擎底层（Template Copilot 扫描 outline 后，单向【编译】生成的底层执行骨架） ──
# 这部分通常对普通业务用户隐藏，是执行每月跑批时的唯一依据。
content:
  datasets:
    
    # [Agent 编译产物 1] 响应 blk_metric_vib 的明确查数意图
    - id: "ds_metric_vib"
      source:
        kind: nl2sql
        description: "查询设备 {$device} 最近一次跑批的振动幅值"
        
    # [Agent 编译产物 2] 响应 blk_chart_trend 的图表取数意图
    - id: "ds_trend_chart"
      source:
        kind: nl2sql
        description: "查询设备 {$device} 最近 3 天的振动曲线历史数据"
        
    # [Agent 编译产物 3] 响应 blk_ai_diag 的大模型评价意图
    - id: "ds_synthesis"
      depends_on: ["ds_metric_vib", "ds_trend_chart"]
      source:
        kind: ai_synthesis
        context:
          refs: ["ds_metric_vib", "ds_trend_chart"]
        knowledge:
          query_template: "针对轴承振动和漏油寻找关联故障指南"
          params: { subject: "主轴承", symptoms: "振幅相关，漏油" }
        prompt: "结合近期告警流水，评估轴承是否存在高频损坏风险，并注意现场已知有轻微漏油现象"

  presentation:
    type: composite_table
    columns: 8
    sections:
      
      # ── 响应组合段落意图的区块 ──
      - band: "振动诊断结论"
        layout:
          type: kv_grid
          dataset_id: "ds_synthesis"
          cols_per_row: 1
          # 这里的渲染器将提取 ds_metric_vib 的真实数值以及 AI 摘要组合显示
          
      # ── 响应 chart 意图，Agent 自动搭建的图表展示壳子 ──
      - band: "辅助分析趋势图"
        dataset_id: "ds_trend_chart"
        layout:
          type: chart
          chart_type: "line"
