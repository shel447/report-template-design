# 示例 5：所见即所得大纲交互（运行时态快照）
# 结构展示：一个处于“定稿期”的模板实例，包含了 outline 修改前后的状态，以及
# Agent (Template Copilot) 是如何据此自动修改底层的 `datasets` 和 `presentation` 的。

title: "3.2 主轴承运行状态分析"

# ── 大纲意图交互层（WYSIWYG 记录现场）──
outline:
  draft_prompt: "提取 ds_vibration 的结论，用一句话概括主轴承状态"
  
  # 系统首次按 draft_prompt 生成的纯客观结论
  original_blocks:
    - id: "blk_1"
      type: "text"
      content: "当前设备主轴承振幅为 8.5mm/s，超过 7.0 的告警阈值，存在高频振动风险。"
  
  # 用户在 Web 界面上使用 Notion 化能力（/ 斜杠命令）修改后的定稿状态
  user_blocks:
    - id: "blk_1"
      type: "text"
      content: "当前设备主轴承振幅为 8.5mm/s，超过 7.0 的告警阈值，现场已发现主轴端盖漏油。"
    - id: "blk_2"
      type: "intent"
      command: "chart"
      content: "补充近 3 天的振动趋势折线图"


# ── 引擎底层（已被 Template Copilot 动态篡改/重构的快照） ──
content:
  datasets:
    
    # 1. 原始固化的客观数据池（正常保留）
    - id: "ds_vibration"
      source:
        kind: sql
        query: "SELECT val, limit FROM vibration_logs WHERE device_id = '{$device}'"
        
    # 2. [由 Agent 动态无中生有] 新增的数据池，专门响应用户提出的“近3天的振动趋势”
    - id: "ds_dynamic_vib_trend_agent_injected"
      source:
        kind: nl2sql
        description: "查询设备 {$device} 最近 3 天的振动曲线历史数据"
        
    # 3. [由 Agent 修改] 原始的 AI 合成节点，被 Agent 强行外挂了“现场漏油”的事实
    - id: "ds_synthesis"
      depends_on: ["ds_vibration"]
      source:
        kind: ai_synthesis
        context:
          refs: ["ds_vibration"]
        knowledge:
          query_template: "针对轴承振动和漏油寻找关联故障指南"
          params: 
            subject: "主轴承"
            symptoms: "振幅过高，漏油"
        prompt: |
          请依据测点数据评估故障。
          【来自用户的现场补充事实，务必纳入分析逻辑：现场已发现主轴端盖漏油。】

  presentation:
    type: composite_table
    columns: 8
    sections:
      
      # ── 原始的简单结论呈现（原封不动） ──
      - band: "振动诊断结论"
        layout:
          type: kv_grid
          dataset_id: "ds_synthesis"
          cols_per_row: 1
          key_span: 2
          value_span: 6
          fields:
            - key: "诊断建议"
              col: "output"
          
      # ── [由 Agent 动态新增] 响应“折线图”诉求插入的图形展现区块区段 ──
      - band: "近 3 天振动趋势 (基于用户意图动态扩充)"
        dataset_id: "ds_dynamic_vib_trend_agent_injected"
        layout:
          type: chart
          chart_type: "line"
