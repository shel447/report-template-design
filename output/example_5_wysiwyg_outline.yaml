# 示例 5：大纲蓝图与单向编译架构 (WYSIWYG Blueprint Compiler)
#
# 核心原则：
#   大纲整体就是一段"意图描述"，block 是意图中可变的参数化部分。
#   block 的 type 描述的是"意图的参数类型"（选哪个指标、看什么时间段），
#   而不是"最终报告的展现形式"（图表还是表格）。
#   最终报告如何展现，由 Agent 编译时根据整体意图自主决策。

title: "3.2 主轴承运行状态分析"

# ══════════════════════════════════════════════════════════
# 大纲蓝图层（用户在前端所见即所得编辑的内容）
# ══════════════════════════════════════════════════════════
outline:
  # 一段连贯的意图描述，其中 {@id} 是可被用户调整的参数化插槽
  document: |
    对设备 {@target_device} 的 {@focus_metric} 进行深度运行状态分析。
    分析范围为 {@analysis_period}，重点关注是否存在 {@cmp_operator} {@warn_threshold} 的异常波动趋势。
    如有异常，请结合 {@supplementary_context} 给出专业诊断及维护建议。

  # 意图参数定义（不涉及任何展现形式，只约束意图的变量部分）
  blocks:
    - id: "target_device"
      type: "param_ref"
      hint: "指定本节分析的目标设备"
      default: "{$device}"
      
    - id: "focus_metric"
      type: "indicator"
      hint: "选择重点关注的监测指标（如振动、温度、压力等）"
      default: "振动幅值"
      
    - id: "analysis_period"
      type: "time_range"
      hint: "指定分析时间跨度"
      default: "近3天"

    - id: "cmp_operator"
      type: "operator"
      hint: "异常判断比较符"
      default: "大于"

    - id: "warn_threshold"
      type: "threshold"
      hint: "异常判断阈值"
      default: "8.5mm/s"
      
    - id: "supplementary_context"
      type: "free_text"
      hint: "补充现场观察到的已知情况（选填）"
      default: "现场已知主轴端盖有轻微漏油现象"


# ══════════════════════════════════════════════════════════
# 编译产物层（Agent 读取上面的意图后，自主决策如何编译出底层结构）
# ══════════════════════════════════════════════════════════
# Agent 的编译推理过程：
#   1. 读到"对...振动幅值进行深度分析" → 决定需要一个取振幅的 nl2sql 数据源
#   2. 读到"分析范围为近3天" + "关注大于 8.5mm/s 的波动" → 决定用折线图来展现趋势，重点标出阈值线
#   3. 读到"结合...漏油现象给出诊断" → 决定需要一个 ai_synthesis 并在 prompt 中融入漏油事实
#   4. 自主决定用 kv_grid 展示结论 + chart 展示趋势的组合排版
content:
  datasets:
    - id: "ds_vibration_current"
      source:
        kind: nl2sql
        description: "查询设备 {$device} 最近一次跑批的振动幅值"
        
    - id: "ds_vibration_trend"
      source:
        kind: nl2sql
        description: "查询设备 {$device} 近 3 天的振动幅值历史数据（按天聚合），并着重标记超过 8.5mm/s 的异常数据"
        
    - id: "ds_diagnosis"
      depends_on: ["ds_vibration_current", "ds_vibration_trend"]
      source:
        kind: ai_synthesis
        context:
          refs: ["ds_vibration_current", "ds_vibration_trend"]
        knowledge:
          query_template: "针对轴承振动异常与漏油寻找关联故障指南"
          params: { subject: "主轴承", symptoms: "振幅异常，漏油" }
        prompt: |
          对设备主轴承的振动幅值进行深度分析，重点关注近3天的异常波动趋势。
          现场补充信息：主轴端盖有轻微漏油现象。请结合以上情况给出专业诊断及维护建议。

  presentation:
    type: composite_table
    columns: 8
    sections:
      - band: "振动诊断结论"
        layout:
          type: kv_grid
          dataset_id: "ds_diagnosis"
          cols_per_row: 1

      - band: "近期振动趋势"
        dataset_id: "ds_vibration_trend"
        layout:
          type: chart
          chart_type: "line"
